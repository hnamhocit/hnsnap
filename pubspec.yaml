name: hnsnap
description: 'A new Flutter project.'
publish_to: 'none'
version: 0.1.0+1

environment:
    sdk: ^3.11.1

dependencies:
    archive: ^3.6.1
    go_router: ^17.1.0
    google_fonts: ^8.0.2
    camera: ^0.12.0+1
    flutter_local_notifications: ^21.0.0
    flutter_timezone: ^5.0.1
    flutter_image_compress: ^2.4.0
    file_picker: ^10.3.2
    gallery_saver_plus: ^3.2.9
    image_cropper: ^12.1.0
    image_picker: ^1.2.1
    lucide_icons_flutter: ^3.1.11
    path: ^1.9.1
    path_provider: ^2.1.5
    photo_manager: ^3.2.0
    sqflite: ^2.4.2
    share_plus: ^10.1.4
    timezone: ^0.11.0
    video_player: ^2.7.0
    flutter:
        sdk: flutter

dev_dependencies:
    flutter_launcher_icons: ^0.14.4
    flutter_test:
        sdk: flutter
    flutter_lints: ^6.0.0

flutter:
    uses-material-design: true
    assets:
        - assets/icon/app_icon.png

flutter_launcher_icons:
    android: true
    ios: true
    image_path: assets/icon/app_icon.png
    remove_alpha_ios: true
